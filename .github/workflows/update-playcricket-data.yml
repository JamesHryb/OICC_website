name: Update PlayCricket Data

on:
  schedule:
    # Run daily at 6 AM UTC (7 AM BST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd scraper
          npm init -y

      - name: Run PlayCricket scraper
        run: |
          cd scraper
          node playcricket-scraper.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/fixtures.json data/results.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update PlayCricket data [skip ci]" && git push)

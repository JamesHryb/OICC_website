name: Update PlayCricket Data

on:
  schedule:
    # Run daily at 6 AM UTC (7 AM BST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Run PlayCricket scraper
        env:
          PLAY_CRICKET_API_KEY: ${{ secrets.PLAY_CRICKET_API_KEY }}
          OICC_SITE_ID: 27452
        run: |
          python scraper/oicc_playcricket.py --multi-season

      - name: Run Achton Villa scraper
        run: |
          python scraper/achton_villa_scraper.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scraped data" && git push)
